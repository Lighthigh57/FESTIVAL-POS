<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>店員画面</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@600;700&display=swap');

  :root {
    --bg: #1A1A2E;
    --surface: #16213E;
    --surface2: #0F3460;
    --primary: #E94560;
    --accent: #F5A623;
    --green: #0EC96B;
    --text: #E8E8F0;
    --text-muted: #7A7A9A;
    --border: #2A2A4A;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; color: var(--text); }

  /* ── ヘッダー ── */
  header {
    background: var(--surface);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .staff-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; }
  header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
  .time-display { font-family: 'Oswald', sans-serif; font-size: 1.4rem; color: var(--accent); letter-spacing: 0.05em; }

  /* ── メイン ── */
  .main { display: flex; height: calc(100vh - 58px); }

  /* ── 左: ステータスパネル ── */
  .status-panel {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 16px;
  }

  .stat-card {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid var(--border);
    text-align: center;
  }
  .stat-card .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .stat-card .stat-value { font-family: 'Oswald', sans-serif; font-size: 2.2rem; color: var(--accent); letter-spacing: 0.02em; }
  .stat-card .stat-unit { font-size: 0.85rem; color: var(--text-muted); }

  .stat-card.green .stat-value { color: var(--green); }

  /* 商品別在庫 */
  .stock-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .stock-section h3 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .stock-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .stock-item {
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
  }
  .stock-name { font-size: 0.85rem; font-weight: 500; }
  .stock-price { font-size: 0.75rem; color: var(--text-muted); }
  .stock-count { font-family: 'Oswald', sans-serif; font-size: 1.2rem; color: var(--text); }
  .stock-count.low { color: var(--primary); }

  /* ── 右: メインエリア ── */
  .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── 決済待ち表示 ── */
  .pending-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    text-align: center;
  }

  .pending-idle {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .pending-idle .idle-icon { font-size: 4rem; opacity: 0.4; }
  .pending-idle p { color: var(--text-muted); font-size: 1rem; }

  /* 決済中パネル */
  .payment-panel {
    width: 100%;
    max-width: 500px;
    background: var(--surface);
    border-radius: 24px;
    border: 2px solid var(--border);
    overflow: hidden;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .payment-panel-header {
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .payment-method-tag {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .method-paypay { background: #C0392B22; color: #E74C3C; border: 1px solid #C0392B55; }
  .method-cash { background: #06D6A022; color: #06D6A0; border: 1px solid #06D6A055; }
  .waiting-label { color: var(--text-muted); font-size: 0.85rem; }
  .waiting-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: blink 1s ease infinite; }
  @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0.2 } }

  .payment-items { padding: 16px 24px; display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; }
  .payment-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .payment-item:last-child { border-bottom: none; }
  .pi-name { font-size: 0.9rem; }
  .pi-qty { font-size: 0.8rem; color: var(--text-muted); margin-left: 8px; }
  .pi-price { font-family: 'Oswald', sans-serif; font-size: 1.1rem; color: var(--accent); }

  .payment-total {
    margin: 0 24px;
    padding: 16px;
    background: var(--bg);
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .pt-label { font-size: 0.85rem; color: var(--text-muted); }
  .pt-amount { font-family: 'Oswald', sans-serif; font-size: 2rem; color: var(--accent); }

  /* ★ 決済完了ボタン ★ */
  .btn-confirm {
    margin: 20px 24px 24px;
    width: calc(100% - 48px);
    padding: 22px;
    background: linear-gradient(135deg, var(--green), #05A355);
    border: none;
    border-radius: 16px;
    color: white;
    font-size: 1.2rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 8px 30px rgba(14, 201, 107, 0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    animation: pulse 1.8s ease infinite;
  }
  @keyframes pulse {
    0%,100%{ box-shadow: 0 8px 30px rgba(14,201,107,0.35) }
    50%{ box-shadow: 0 8px 40px rgba(14,201,107,0.6) }
  }
  .btn-confirm:active { transform: scale(0.97); animation: none; }

  /* ── 売上ログ ── */
  .log-panel {
    height: 200px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .log-header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .log-header h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .log-body { flex: 1; overflow-y: auto; padding: 8px 20px; display: flex; flex-direction: column; gap: 6px; }
  .log-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeSlide 0.3s ease;
  }
  @keyframes fadeSlide { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  .log-time { color: var(--text-muted); width: 60px; flex-shrink: 0; }
  .log-method { padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; }
  .log-method.cash { background: #06D6A022; color: #06D6A0; }
  .log-method.paypay { background: #E74C3C22; color: #E74C3C; }
  .log-items { flex: 1; color: var(--text-muted); }
  .log-price { font-family: 'Oswald', sans-serif; color: var(--accent); }

  /* ── 接続待ち ── */
  #connecting { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 300; }
  .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #connecting p { color: var(--text-muted); font-size: 0.95rem; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="connecting">
  <div class="spinner"></div>
  <p>サーバーに接続中...</p>
</div>

<header>
  <div class="staff-badge">STAFF</div>
  <h1 id="store-name">読み込み中...</h1>
  <div class="time-display" id="time">--:--</div>
</header>

<div class="main">
  <!-- 左パネル: 統計 -->
  <div class="status-panel">
    <div class="stat-card green">
      <div class="stat-label">売上合計</div>
      <div class="stat-value">¥<span id="revenue">0</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">取引件数</div>
      <div class="stat-value"><span id="sales-count">0</span><span class="stat-unit"> 件</span></div>
    </div>
    <div class="stock-section">
      <h3>在庫状況</h3>
      <div class="stock-list" id="stock-list"></div>
    </div>
  </div>

  <!-- 右パネル: メイン -->
  <div class="right-panel">
    <div class="pending-area" id="pending-area">
      <div class="pending-idle" id="pending-idle">
        <div class="idle-icon">⌛</div>
        <p>客の注文を待っています...</p>
      </div>
      <!-- 決済パネルは動的に挿入 -->
    </div>

    <!-- 売上ログ -->
    <div class="log-panel">
      <div class="log-header">
        <h3>売上ログ</h3>
      </div>
      <div class="log-body" id="log-body">
        <div style="color:var(--text-muted);font-size:0.82rem;text-align:center;padding:20px">まだ売上がありません</div>
      </div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const STORE_ID = params.get('store') || 'store1';
const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host;

let ws;
let currentStore = null;
let salesLog = [];

// 時計
setInterval(() => {
  const now = new Date();
  document.getElementById('time').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}, 1000);

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => ws.send(JSON.stringify({ type: 'REGISTER', role: 'staff', storeId: STORE_ID }));
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'REGISTERED') document.getElementById('connecting').style.display = 'none';
    if (msg.type === 'STORE_STATE') updateState(msg.store);
    if (msg.type === 'ERROR') alert('エラー: ' + msg.message);
  };
  ws.onclose = () => {
    document.getElementById('connecting').style.display = 'flex';
    setTimeout(connect, 2000);
  };
}

function updateState(store) {
  document.getElementById('store-name').textContent = '🎪 ' + store.name;
  document.getElementById('revenue').textContent = store.totalRevenue.toLocaleString();
  document.getElementById('sales-count').textContent = store.salesCount;

  // 在庫リスト更新
  const stockList = document.getElementById('stock-list');
  stockList.innerHTML = store.products.map(p => `
    <div class="stock-item">
      <div>
        <div class="stock-name">${p.name}</div>
        <div class="stock-price">¥${p.price}</div>
      </div>
      <div class="stock-count${p.stock <= 5 ? ' low' : ''}">${p.stock}</div>
    </div>
  `).join('');

  // 決済待ちパネル
  renderPendingArea(store.pendingPayment);
}

function renderPendingArea(pending) {
  const area = document.getElementById('pending-area');
  document.getElementById('pending-idle').style.display = pending ? 'none' : '';

  // 既存パネルを削除
  const old = document.getElementById('payment-panel');
  if (old) old.remove();

  if (!pending) return;

  const method = pending.method;
  const methodLabel = method === 'paypay' ? '📱 PayPay' : '💴 現金';
  const methodClass = method === 'paypay' ? 'method-paypay' : 'method-cash';

  const panel = document.createElement('div');
  panel.id = 'payment-panel';
  panel.className = 'payment-panel';
  panel.innerHTML = `
    <div class="payment-panel-header">
      <div class="payment-method-tag ${methodClass}">${methodLabel}</div>
      <div class="waiting-label">決済待ち</div>
      <div class="waiting-dot"></div>
    </div>
    <div class="payment-items">
      ${pending.items.map(i => `
        <div class="payment-item">
          <div><span class="pi-name">${i.name}</span><span class="pi-qty">× ${i.qty}</span></div>
          <div class="pi-price">¥${(i.price * i.qty).toLocaleString()}</div>
        </div>`).join('')}
    </div>
    <div class="payment-total">
      <span class="pt-label">お会計</span>
      <span class="pt-amount">¥${pending.total.toLocaleString()}</span>
    </div>
    <button class="btn-confirm" onclick="confirmPayment()">✅ 決済が完了した</button>
  `;
  area.appendChild(panel);
}

function confirmPayment() {
  ws.send(JSON.stringify({ type: 'CONFIRM_PAYMENT', storeId: STORE_ID }));
}

connect();
</script>
</body>
</html>
